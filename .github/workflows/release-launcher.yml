# Builds the Tauri launcher on every git tag push (e.g. `git tag v0.1.0`),
# producing .exe (Windows), .dmg (macOS), and .AppImage (Linux). Uploads
# all artifacts to a GitHub Release with the matching tag.
#
# Trigger:  git tag v0.1.0  &&  git push --tags
# Result:   github.com/bluestatic11/shadow-client/releases/tag/v0.1.0

name: Release launcher

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            label: 'windows'
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            label: 'macos'
          - platform: 'ubuntu-22.04'
            args: ''
            label: 'linux'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # tauri-action only needs HEAD, but `git log` for the release
          # body below needs the actual commit history. fetch-depth: 0
          # pulls everything.
          fetch-depth: 0

      - name: Extract commit message for release body
        id: changelog
        shell: bash
        run: |
          # Pull the FULL commit message of the tagged commit (subject +
          # body). Without this every release gets the same hardcoded
          # template and the launcher's "Latest updates" card looks
          # identical for every version.
          #
          # We use github.ref_name (e.g. "v0.3.27"), resolve it to the
          # commit it points at, and pretty-format the message. The
          # GITHUB_OUTPUT heredoc preserves multi-line content correctly.
          {
            echo 'body<<CHANGELOG_EOF'
            git log -1 --pretty=format:'%B' "${{ github.ref_name }}"
            echo
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm install

      - name: Generate platform icons (.ico / .icns from icon.png)
        working-directory: launcher
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png --output src-tauri/icons

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'Shadow Client ${{ github.ref_name || inputs.version }}'
          # Real per-version changelog drawn from the tagged commit
          # message. The launcher's "Latest updates" card extracts the
          # first readable line of this body — by including the actual
          # commit content, each release card now shows what changed in
          # that version instead of the same boilerplate.
          releaseBody: |
            ${{ steps.changelog.outputs.body }}

            ---

            **Downloads:** `.exe` (Windows NSIS) · `.msi` (Windows) ·
            `.dmg` (macOS universal) · `.AppImage` or `.deb` (Linux)

            Auto-update from v0.3.27+ is silent — no installer wizard.
            Report issues at
            https://github.com/bluestatic11/shadow-client/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
