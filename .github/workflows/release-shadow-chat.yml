# Builds the Shadow Chat Fabric mod on every push of a `chat-mod-v*`
# tag, then publishes the resulting .jar as a GitHub Release asset.
#
# The Shadow Client launcher's auto-installer (mods.rs::DIRECT_URL_MODS)
# resolves `https://github.com/<org>/<repo>/releases/download/chat-mod-v0.1.0/
# shadow-chat-0.1.0.jar` — bumping the mod_version in
# shadow-chat/gradle.properties and pushing a matching tag here is all
# it takes to ship a new mod version.
#
# Trigger:  git tag chat-mod-v0.1.0  &&  git push --tags
# Result:   github.com/bluestatic11/shadow-client/releases/tag/chat-mod-v0.1.0
#           with shadow-chat-0.1.0.jar attached
#
# This is intentionally a SEPARATE workflow from release-launcher.yml so
# tagging the mod doesn't trigger a full Tauri build, and bumping the
# launcher doesn't trigger a Gradle build either. The two release
# trains move independently.

name: Release shadow-chat mod

on:
  push:
    tags: ['chat-mod-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Mod version tag (e.g. chat-mod-v0.1.0)'
        required: true
        default: 'chat-mod-v0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so the changelog extraction below can resolve
          # the tagged commit's message.
          fetch-depth: 0

      - name: Extract user-facing changelog
        id: changelog
        shell: bash
        run: |
          # Same convention as release-launcher.yml: user-facing summary
          # at the top of the commit body, "---" or "Technical:" marks
          # the start of dev-facing detail that doesn't belong in the
          # release page.
          tag="${{ github.ref_name || inputs.tag }}"
          raw=$(git log -1 --pretty=format:'%B' "$tag")
          summary=$(echo "$raw" | awk '
            BEGIN { skipped_subject = 0 }
            !skipped_subject && /^(chat-mod-)?v[0-9]/ { next }
            !skipped_subject && /^$/ { next }
            { skipped_subject = 1 }
            /^---+\s*$/ { exit }
            /^(Technical|Details|Internal|Notes for devs):\s*$/ { exit }
            { print }
          ')
          if [ -z "$(echo "$summary" | tr -d '[:space:]')" ]; then
            summary=$(echo "$raw" | head -1)
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$summary"
            echo ''
            echo '---'
            echo ''
            echo 'Drop the attached `.jar` into a 1.21.11 Fabric profile'
            echo 'OR install Shadow Client which auto-installs this mod.'
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        working-directory: shadow-chat
        run: gradle build --no-daemon --console=plain

      - name: Locate built JAR
        id: artifact
        working-directory: shadow-chat
        shell: bash
        run: |
          # The remapJar task produces the loader-ready jar. Loom names
          # it from archives_base_name + mod_version; pick the first jar
          # in build/libs that doesn't end in -sources.jar or -dev.jar.
          jar=$(ls build/libs/*.jar | grep -v -E '(\-sources|\-dev)\.jar$' | head -1)
          if [ -z "$jar" ]; then
            echo "no jar found under build/libs/" >&2
            ls -la build/libs/ >&2
            exit 1
          fi
          echo "path=shadow-chat/$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: 'Shadow Chat ${{ github.ref_name || inputs.tag }}'
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
