# Builds the Tauri launcher on every git tag push (e.g. `git tag v0.1.0`),
# producing .exe (Windows), .dmg (macOS), and .AppImage (Linux). Uploads
# all artifacts to a GitHub Release with the matching tag.
#
# Trigger:  git tag v0.1.0  &&  git push --tags
# Result:   github.com/bluestatic11/shadow-client/releases/tag/v0.1.0

name: Release launcher

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            label: 'windows'
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            label: 'macos'
          - platform: 'ubuntu-22.04'
            args: ''
            label: 'linux'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # tauri-action only needs HEAD, but `git log` for the release
          # body below needs the actual commit history. fetch-depth: 0
          # pulls everything.
          fetch-depth: 0

      - name: Extract user-facing changelog for release body
        id: changelog
        shell: bash
        run: |
          # Pull the commit message of the tagged commit and slice out a
          # USER-FACING summary. Convention (v0.3.31+): the commit body
          # contains a bullet list at the top describing what changed in
          # end-user terms ("Added in-game chat", "Minor QoL fixes"). The
          # technical detail comes after a "---" or below a "Technical:"
          # heading and is hidden from the GitHub release page since most
          # people reading the changelog don't care about which Rust
          # function was edited.
          #
          # Slicing rules:
          #   - Drop the subject line ("v0.3.31 — Headline") — already
          #     visible as the release title.
          #   - Stop at the first "---" hr (separates summary from detail).
          #   - Stop at the first "Technical:" / "Details:" line.
          #   - Skip blank leading lines.
          #
          # Falls back to the full body if neither marker is present so
          # old-style commits still render something.

          raw=$(git log -1 --pretty=format:'%B' "${{ github.ref_name }}")

          # Use awk to slice. `body` accumulates lines until a stop marker.
          summary=$(echo "$raw" | awk '
            BEGIN { skipped_subject = 0; printing = 0 }
            # Drop the subject line + any blank lines immediately after it.
            !skipped_subject && /^v[0-9]/ { next }
            !skipped_subject && /^$/ { next }
            { skipped_subject = 1 }
            # Stop at horizontal rule or "Technical:" heading.
            /^---+\s*$/ { exit }
            /^(Technical|Details|Internal|Notes for devs):\s*$/ { exit }
            { print }
          ')

          # If the summary came out empty (commit has no body), fall back
          # to the subject so the release still has *some* content.
          if [ -z "$(echo "$summary" | tr -d '[:space:]')" ]; then
            summary=$(echo "$raw" | head -1)
          fi

          {
            echo 'body<<CHANGELOG_EOF'
            echo "$summary"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm install

      - name: Generate platform icons (.ico / .icns from icon.png)
        working-directory: launcher
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png --output src-tauri/icons

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'Shadow Client ${{ github.ref_name || inputs.version }}'
          # Real per-version changelog drawn from the tagged commit
          # message. The launcher's "Latest updates" card extracts the
          # first readable line of this body — by including the actual
          # commit content, each release card now shows what changed in
          # that version instead of the same boilerplate.
          releaseBody: |
            ${{ steps.changelog.outputs.body }}

            ---

            **Downloads:** `.exe` (Windows NSIS) · `.msi` (Windows) ·
            `.dmg` (macOS universal) · `.AppImage` or `.deb` (Linux)

            Auto-update from v0.3.27+ is silent — no installer wizard.
            Report issues at
            https://github.com/bluestatic11/shadow-client/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
