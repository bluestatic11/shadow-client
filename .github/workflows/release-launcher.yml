# Builds the Tauri launcher on every git tag push (e.g. `git tag v0.1.0`),
# producing .exe (Windows), .dmg (macOS), and .AppImage (Linux). Uploads
# all artifacts to a GitHub Release with the matching tag.
#
# Trigger:  git tag v0.1.0  &&  git push --tags
# Result:   github.com/bluestatic11/shadow-client/releases/tag/v0.1.0

name: Release launcher

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            label: 'windows'
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            label: 'macos'
          - platform: 'ubuntu-22.04'
            args: ''
            label: 'linux'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm install

      - name: Generate platform icons (.ico / .icns from icon.png)
        working-directory: launcher
        run: npx --yes @tauri-apps/cli@^2 icon src-tauri/icons/icon.png --output src-tauri/icons

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: launcher
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: 'Shadow Client ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## Shadow Client ${{ github.ref_name || inputs.version }}

            **Downloads:**
            - **Windows:** `.exe` installer (NSIS) or `.msi` (MSI)
            - **macOS:** `.dmg` (universal binary, Intel + Apple Silicon)
            - **Linux:** `.AppImage` or `.deb`

            First-launch flow: pick a username, click PLAY, the launcher
            downloads MC 1.21.11 + Fabric + the performance mod stack
            automatically.

            **System requirements:**
            - Windows 10 / 11 (x64), macOS 12+, or Linux x86_64
            - 4 GB RAM minimum, 8 GB recommended
            - Python 3.11+ on PATH (the launcher subprocess-calls it for setup)

            **Notes:**
            - On Windows, SmartScreen may flag the unsigned `.exe`. Click "More info → Run anyway". Code signing comes in a later release.
            - This is **v0.1.0** — early access. Report issues at https://github.com/bluestatic11/shadow-client/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
